<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Active Exam | ScienceNest</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="../css/main.css">
</head>


  <!-- Exam Header -->
  <header class="active-exam-header">

<a href="dashboard.html" class="active-exam-logo">
  <span class="active-exam-logo__icon">
    <i class="bi bi-rocket-takeoff-fill"></i>
  </span>

  <span>ScienceNest</span>
</a>
    <h1 id="examTitle" class="active-exam-title">
      Loading exam...
    </h1>

    <div class="active-exam-user">

      <button
        type="button"
        id="examHelpButton"
        class="exam-help-button"
        aria-label="Exam help"
      >
        <i class="bi bi-question-circle"></i>
      </button>

      <div
        id="studentAvatar"
        class="student-avatar"
      >
        S
      </div>

    </div>

  </header>

  <!-- Timer and progress -->
  <section class="exam-status-bar">

    <div class="exam-status-content">

      <div class="exam-timer">

        <i class="bi bi-stopwatch-fill"></i>

        <strong id="timer">
          30:00
        </strong>

      </div>

      <div class="exam-question-progress">

        <span id="progressText">
          0 of 0 answered
        </span>

        <div class="exam-progress-track">

          <div
            id="examProgressBar"
            class="exam-progress-fill"
          ></div>

        </div>

      </div>

    </div>

  </section>

  <!-- Main content -->
  <main class="active-exam-main">

    <!-- Question navigation -->
    <aside class="question-navigation">

      <div class="question-navigation__header">

        <i class="bi bi-grid"></i>

        <h2>Exam Navigation</h2>

      </div>

      <div
        id="questionNavigation"
        class="question-navigation__numbers"
      ></div>

      <div class="question-navigation__footer">

        <span class="navigation-status-dot"></span>

        <span>Answered Questions</span>

      </div>

    </aside>

    <!-- Questions -->
    <section class="exam-questions-section">

      <p id="examDetails" class="exam-details">
        Preparing your exam...
      </p>

      <form id="examForm">

        <div id="questionsContainer"></div>

        <div
          id="examMessage"
          class="exam-page-message d-none"
        ></div>

        <div
          id="examActions"
          class="exam-actions d-none"
        >

          <button
            type="submit"
            class="submit-exam-button"
          >
            <i class="bi bi-rocket-takeoff-fill"></i>

            Submit Exam
          </button>

        </div>

      </form>

    </section>

  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script src="../js/db.js"></script>
  <script src="../js/take-exam.js"></script>

</body>

</html>
