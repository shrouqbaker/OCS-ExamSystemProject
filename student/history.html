<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Exam History | ScienceNest</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="../css/main.css">
</head>

<body data-role="student" data-page="history">

  <div class="dashboard-layout">

    <aside
      id="sidebar"
      class="app-sidebar offcanvas-lg offcanvas-start"
      tabindex="-1"
    ></aside>

    <div class="dashboard-main">

      <header id="topbar"></header>

      <main class="dashboard-content exam-history-page">

        <section class="history-hero">

          <div class="history-hero__content">

            <span class="history-hero__badge">
              <i class="bi bi-clock-history"></i>
              Exam History
            </span>

            <h1>
              My Science Mission Log
            </h1>

            <p>
              Review your past adventures and see how much
              you have learned!
            </p>

            <div class="history-hero__count">

              <strong id="missionsCount">
                0
              </strong>

              <span>Completed Missions</span>

            </div>

          </div>

          <div class="history-hero__image">

            <img
              src="../images/science.jpg"
              alt="Science missions"
            >

          </div>

        </section>

        <section
          id="historyList"
          class="history-list"
        ></section>

        <section
          id="emptyHistoryMessage"
          class="history-empty d-none"
        >

          <i class="bi bi-journal-x"></i>

          <h2>No completed exams yet</h2>

          <p>
            Your completed science missions will appear here.
          </p>

          <a href="exams.html">
            Explore Available Exams
          </a>

        </section>

      </main>

    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script src="../js/db.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/exam-history.js"></script>

</body>

</html>
