<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Available Exams | ScienceNest</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Project CSS -->
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages/exam.css">
</head>

<body data-role="student" data-page="exams">

  <div class="dashboard-layout">

    <!-- Shared Sidebar -->
    <aside
      id="sidebar"
      class="app-sidebar offcanvas-lg offcanvas-start"
      tabindex="-1"
    ></aside>

    <div class="dashboard-main">

      <!-- Shared Topbar -->
      <header id="topbar"></header>

      <!-- Page Content -->
      <main class="dashboard-content available-exams-page">

        <section class="mission-banner">

          <div class="mission-banner__content">

            <h1>Ready for your next mission?</h1>

            <p>
              Explore the wonders of science through interactive exams.
            </p>

            <span class="mission-banner__badge">
              <i class="bi bi-lightning-charge-fill"></i>
              <span id="activeExamsCount">0 Available Exams</span>
            </span>

          </div>

          <i class="bi bi-journal-code mission-banner__icon"></i>

        </section>

        <section class="exams-section">

          <!-- الامتحانات تنعرض هون من JavaScript -->
          <div
            id="examsContainer"
            class="row g-4"
          ></div>

          <!-- تظهر إذا ما في امتحانات -->
          <div
            id="emptyExamsMessage"
            class="empty-exams-message d-none"
          >
            <i class="bi bi-clipboard-x"></i>

            <h2>No available exams</h2>

            <p>
              There are no active exams at the moment.
            </p>
          </div>

        </section>

      </main>

    </div>

  </div>

  <!-- Bootstrap -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <!-- لازم db.js يكون أول ملف -->
  <script src="../js/db.js"></script>

  <!-- Shared Layout -->
  <script src="../js/layout.js"></script>

  <!-- Available Exams Page -->
  <script src="../js/available-exams.js"></script>

</body>

</html>
