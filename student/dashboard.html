<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/dashboardStudent.css">

    
    <title>Document</title>
</head>

<body data-role="student" data-page="dashboard">

    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <!-- Main -->
        <main class="dashboard-main">

            <!-- Topbar -->
            <header id="topbar"></header>


            <!-- Content -->
            <div class="dashboard-content">

                <!-- Hero -->
                <section class="hero-section">

                    <div class="row align-items-center">

                        <div class="col-lg-7">

                            <i class="bi bi-stars hero-icon"></i>

                            <h2 class="hero-title">
                                Welcome back,
                                <span id="studentName"></span>!
                            </h2>

                            <p class="hero-text">
                                Ready for your next science adventure?
                            </p>

                            <a href="exams.html" class="hero-btn btn ">
                                Explore Topics
                                <i class="bi bi-stars ms-2"></i>
                            </a>

                        </div>

                        <div class="col-lg-5 text-center">

                            <img src="../assets/images/dashboard.png" class="hero-image" alt="Dashboard">

                        </div>

                    </div>

                </section>

                <!-- ================= Statistics ================= -->

                <section class="stats-section">

                    <div class="row g-4">

                        <div class="col-lg-4 col-md-6">

                            <div class="stats-card">

                                <div class="stats-icon green">
                                    <i class="bi bi-check-circle-fill"></i>
                                </div>

                                <div>

                                    <h3 id="completedExams">0</h3>

                                    <p>Completed Exams</p>

                                </div>

                            </div>

                        </div>

                        <div class="col-lg-4 col-md-6">

                            <div class="stats-card">

                                <div class="stats-icon purple">
                                    <i class="bi bi-journal-bookmark-fill"></i>
                                </div>

                                <div>

                                    <h3 id="availableExams">0</h3>

                                    <p>Available Exams</p>

                                </div>

                            </div>

                        </div>

                        <div class="col-lg-4 col-md-6">

                            <div class="stats-card">

                                <div class="stats-icon orange">
                                    <i class="bi bi-bar-chart-fill"></i>
                                </div>

                                <div>

                                    <h3 id="averageScore">0%</h3>

                                    <p>Average Grade</p>

                                </div>

                            </div>

                        </div>

                    </div>

                </section>

                <!-- ================= Available Exams ================= -->

                <section class="exam-section">

                    <div class="section-header">

                        <div>
                            <h3>Available Exams</h3>
                            <p>Your upcoming science challenges.</p>
                        </div>

                        <a href="exams.html" class="view-all">
                            View All
                            <i class="bi bi-arrow-right"></i>
                        </a>

                    </div>

                    <div class="row g-4" id="availableExamList">

                    </div>

                </section>

                <!-- ================= Recent Results ================= -->

                <section class="results-section">

                    <div class="section-header">

                        <div>
                            <h3>Recent Results</h3>
                            <p>Your latest completed exams.</p>
                        </div>

                        <a href="history.html" class="view-all">
                            View All
                            <i class="bi bi-arrow-right"></i>
                        </a>

                    </div>

                    <div class="table-responsive">

                        <table class="table align-middle results-table">

                            <thead>

                                <tr>

                                    <th>Exam</th>

                                    <th>Score</th>

                                    <th>Grade</th>

                                    <th>Status</th>

                                    <th></th>

                                </tr>

                            </thead>

                            <tbody id="resultsTableBody">

                            </tbody>

                        </table>

                    </div>

                </section>

            </div>

        </main>

    </div>

    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/dashboardStudent.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
