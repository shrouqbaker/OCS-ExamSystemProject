<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Review Exam | ScienceNest</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <link rel="stylesheet" href="../css/main.css">
</head>

<body data-role="student" data-page="review-exam">

  <div class="dashboard-layout">

    <aside
      id="sidebar"
      class="app-sidebar offcanvas-lg offcanvas-start"
      tabindex="-1"
    ></aside>

    <div class="dashboard-main">

      <header id="topbar"></header>

      <main class="dashboard-content review-exam-page">

        <section class="review-summary">

          <div>
            <span class="review-summary__label">
              Exam Review
            </span>

            <h1 id="reviewExamTitle">
              Loading exam...
            </h1>

            <p id="reviewExamDetails">
              Review your submitted answers.
            </p>
          </div>

          <div class="review-summary__score">

            <span>Final Score</span>

            <strong id="reviewScore">
              0%
            </strong>

          </div>

        </section>

        <section
          id="reviewQuestions"
          class="review-questions"
        ></section>

        <div
          id="reviewMessage"
          class="review-message d-none"
        ></div>

        <div class="review-page-actions">

          <a
            href="dashboard.html"
            class="review-back-button"
          >
            <i class="bi bi-arrow-left"></i>
            Back to Dashboard
          </a>

          <a
            href="history.html"
            class="review-history-button"
          >
            Exam History
            <i class="bi bi-arrow-right"></i>
          </a>

        </div>

      </main>

    </div>

  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  ></script>

  <script src="../js/db.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/review-exam.js"></script>

</body>

</html>
