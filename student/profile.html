<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/profileStudent.css">
    <title>Student Profile</title>


</head>

<body data-role="student" data-page="profile">

    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <main class="dashboard-main">

            <!-- Topbar -->
            <div id="topbar"></div>

            <div class="dashboard-content">

                <!-- ================= Hero ================= -->

                <section class="profile-hero">

                    <div class="row align-items-center">

                        <div class="col-lg-8">

                            <div class="d-flex align-items-center gap-4 flex-wrap">

                                <img id="studentImage" src="../assets/images/femal.jpg" class="profile-avatar"
                                    alt="student">

                                <div>
                                    <h2 id="studentName" class="colorwhite"></h2>

                                    <span class="profile-role">

                                        Science Student

                                    </span>

                                    <p class="profile-id mt-3">

                                        <i class="bi bi-person-vcard"></i>

                                        National ID :

                                        <span id="studentNationalId"></span>

                                    </p>

                                </div>

                            </div>

                        </div>

                        <div class="col-lg-4">

                            <div class="profile-score-card">

                                <i class="bi bi-award-fill score-icon"></i>

                                <h3 id="averageScore" class="colorwhite">0%</h3>

                                <span>Average Score</span>

                            </div>

                        </div>

                    </div>

                </section>

                <!-- ================= Information ================= -->

                <div class="row g-4 mt-4">

                    <div class="col-lg-12">

                        <div class="profile-card">

                            <h4>

                                <i class="bi bi-person-lines-fill"></i>

                                Personal Information

                            </h4>

                            <div class="row mt-4">

                                <div class="col-md-6">

                                    <div class="info-box">

                                        <span>Username</span>

                                        <strong id="studentUsername"></strong>

                                    </div>

                                </div>

                                <div class="col-md-6">

                                    <div class="info-box">

                                        <span>Phone</span>

                                        <strong id="studentPhone"></strong>

                                    </div>

                                </div>

                                <div class="col-md-6 mt-4">

                                    <div class="info-box">

                                        <span>Gender</span>

                                        <strong id="studentGender"></strong>

                                    </div>

                                </div>

                                <div class="col-md-6 mt-4">

                                    <div class="info-box">

                                        <span>Completed Exams</span>

                                        <strong id="completedExams"></strong>

                                    </div>

                                </div>

                            </div>

                        </div>


                    </div>


                </div>

            </div>

        </main>

    </div>

    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/profileStudent.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
