<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/pages/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title>Login</title>
</head>

<body>

    <header>

        <nav class="navbar navbar-expand-lg">

            <div class="container">

                <a class="navbar-brand logo" href="home.html">

                    <span class="logo-icon">
                        <i class="bi bi-rocket-takeoff-fill"></i>
                    </span>

                    <span>ScienceNest</span>

                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">

                    <span class="navbar-toggler-icon"></span>

                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">

                    <ul class="navbar-nav align-items-lg-center me-lg-4">

                        <li class="nav-item">
                            <a class="nav-link" href="home.html">
                                Home
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="about.html">
                                About Us
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">
                                Contact Us
                            </a>
                        </li>

                    </ul>

                </div>

            </div>

        </nav>

    </header>

    <main class="login-page">

        <div class="container-fluid">

            <div class="row min-vh-100">

                <!-- Left Side -->

                <section class="col-lg-5 login-left d-flex justify-content-center align-items-center position-relative">

                    <i class="fa-solid fa-flask bg-icon flask"></i>
                    <i class="fa-solid fa-vials bg-icon vials"></i>
                    <i class="fa-solid fa-award bg-icon award"></i>

                    <div class="left-content">

                        <h1>Ready to Discover?</h1>

                        <p>
                            Put on your lab coat!
                            Your next scientific adventure
                            is just one click away.
                        </p>

                    </div>

                </section>

                <!-- Right Side -->

                <section class="col-lg-7 login-right d-flex justify-content-center align-items-center">

                    <div class="login-box">

                        <h2>Welcome Back, Scientist!</h2>

                        <p class="login-subtitle">
                            Log in to track your grades and start experiments.
                        </p>

                        <form id="loginForm">

                            <div class="mb-4">

                                <label class="form-label">
                                    Username
                                </label>

                                <div class="input-box">

                                    <i class="fa-solid fa-user"></i>

                                    <input type="text" id="username" placeholder="Enter your username" required>

                                </div>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Password
                                </label>

                                <div class="input-box">

                                    <i class="fa-solid fa-lock"></i>

                                    <input type="password" id="password" placeholder="Enter your password" required>

                                </div>

                            </div>

                            <div class="login-options">

                                <label class="remember">

                                    <input type="checkbox">

                                    Remember me

                                </label>

                                <a href="#">

                                    Forgot Password?

                                </a>

                            </div>

                            <p id="loginError" class="text-danger text-center mb-3"></p>

                            <button type="submit" class="login-btn2 border-0">

                                Log In to Your Lab

                            </button>

                        </form>

                    </div>

                </section>

            </div>

        </div>

    </main>

    <script src="js/db.js"></script>
    <script src="js/login.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
