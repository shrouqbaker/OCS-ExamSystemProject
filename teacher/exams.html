<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScienceNest - Exams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body data-role="teacher" data-page="exams">
    <!-- Shared Sidebar Layout Wrapper -->
    <div class="dashboard-layout">

        <!-- Dynamic Sidebar Container -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <main class="dashboard-main">

            <!-- Dynamic Topbar Container -->
            <div id="topbar"></div>

            <!-- Page Main Content Slot -->
            <div class="dashboard-content">
                <section class="exams-page">
                    <div class="container-fluid">

                        <!-- Header: Title and Action Trigger -->
                        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 exams-page__header mb-4">
                            <div>
                                <h1 class="exams-page__title">
                                    Current Science Missions <i class="bi bi-rocket-takeoff-fill icon"></i>
                                </h1>
                                <p class="exams-page__subtitle">Manage active quizzes and curriculum challenges.</p>
                            </div>

                            <a href="create-exam.html" class="btn--primary">
                                <i class="bi bi-plus-circle icon"></i> Create New Exam
                            </a>
                        </div>

                        <!-- Target Grid for JavaScript Render Engine -->
                        <div id="examsList" class="row g-4">
                            <!-- Exam cards are rendered here by exams.js, sourced from getExamsByTeacher() in db.js -->
                        </div>
                        
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Application Core Script Dependencies -->
    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/pages/teacher/exams.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
