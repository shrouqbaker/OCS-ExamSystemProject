<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/profileTeacher.css">

    <title>profile</title>
</head>



<body data-role="teacher" data-page="profile">
    <!-- Shared Sidebar -->
    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <main class="dashboard-main">

            <!-- Topbar -->
            <div id="topbar"></div>

            <div class="dashboard-content">

                <section class="profile-header">

                    <div class="profile-avatar" id="profileAvatar"></div>

                    <div>
                        <h1 id="teacherName"></h1>
                    </div>

                </section>



                <section class="dashboard-section">

                    <div class="section-header">

                        <h2>

                            <i class="bi bi-person-vcard-fill"></i>

                            Personal Information

                        </h2>

                    </div>

                    <div class="row g-4">

                        <!-- Full Name -->

                        <div class="col-lg-6">

                            <div class="profile-card profile-card--green">

                                <small>Full Name</small>

                                <div class="profile-info">

                                    <i class="bi bi-person"></i>

                                    <span id="fullName"></span>

                                </div>

                            </div>

                        </div>

                        <!-- Username -->

                        <div class="col-lg-6">

                            <div class="profile-card profile-card--purple">

                                <small>Username</small>

                                <div class="profile-info">

                                    <i class="bi bi-at"></i>

                                    <span id="username"></span>

                                </div>

                            </div>

                        </div>

                        <!-- Phone -->

                        <div class="col-lg-6">

                            <div class="profile-card profile-card--purple">

                                <small>Phone Number</small>

                                <div class="profile-info">

                                    <i class="bi bi-telephone"></i>

                                    <span id="phone"></span>

                                </div>

                            </div>

                        </div>

                        <!-- Experience -->

                        <div class="col-lg-6">

                            <div class="profile-card profile-card--green">

                                <small>Years of Experience</small>

                                <div class="profile-info">

                                    <i class="bi bi-award"></i>

                                    <span id="experience"></span>

                                </div>

                            </div>

                        </div>

                    </div>

                    <!-- About -->

                    <div class="about-box">

                        <small>About Me</small>

                        <p id="about"></p>

                    </div>

                </section>

            </div>


        </main>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/profileTeacher.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>



</html>
