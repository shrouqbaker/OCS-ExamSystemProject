<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/students.css">
    <title>Exams</title>
</head>



<body data-role="teacher" data-page="students">
    <!-- Shared Sidebar -->
    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <main class="dashboard-main">

            <!-- Topbar -->
            <div id="topbar"></div>
            <div class="dashboard-content">

                <section class="students-hero">

                    <div class="students-hero__content">

                        <h1 class="students-title">
                            Student Directory
                        </h1>

                        <p class="students-subtitle">
                            Manage your science explorers and track their lab progress.
                        </p>

                    </div>

                    <div class="students-hero__shapes">


                        <i class="bi bi-mortarboard shape-gray"></i>

                    </div>

                </section>


                <div class="students-toolbar">

                    <button class="btn--primary" id="addStudentBtn">

                        <i class="bi bi-plus-lg"></i>

                        Add New Student

                    </button>

                </div>

        

                <section class="dashboard-section">

                    <div class="table-responsive">

                        <table class="table dashboard-table align-middle ">

                            <thead>

                                <tr>

                                    <th>Student Name</th>

                                    <th>Gender</th>

                                    <th>National ID</th>

                                    <th>Username</th>

                                    <th class="text-end">Actions</th>

                                </tr>

                            </thead>

                            <tbody id="studentsTableBody">

                            </tbody>

                        </table>

                    </div>

                 

                    <div class="students-footer">

                        <span id="studentsCount">

                            Showing 0 students

                        </span>

                        <div id="pagination">

                        </div>

                    </div>

                </section>

            </div>
        </main>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/students.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>



</html>
