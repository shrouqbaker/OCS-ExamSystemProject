<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScienceNest - Exam Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>

<body data-role="teacher" data-page="results">
  <!-- Shared Sidebar Layout Infrastructure -->
  <div class="dashboard-layout">

    <!-- Dynamic Sidebar Injection Anchor -->
    <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
    </aside>

    <main class="dashboard-main">

      <!-- Dynamic Topbar Injection Anchor -->
      <div id="topbar"></div>

      <!-- Core Contextual Workspace Container -->
      <div class="dashboard-content">
        <section class="exam-review-page">
          <div class="container-fluid exam-review-page__container">

            <!-- Breadcrumb Navigation Path -->
            <nav class="exam-review__breadcrumb mb-4">
              <a href="results.html">Results</a>
              <span>&gt;</span>
              <span id="breadcrumbStudentName"></span>
              <span>&gt;</span>
              <strong>Exam Review</strong>
            </nav>

            <!-- Metrics, Questions & Sticky Sidebar Grid Layout -->
            <div class="row g-4 align-items-start">

              <!-- Left Column: Compact Student Card, Questions Review, and Teacher Feedback -->
              <div class="col-lg-9">
                <!-- Compact Student Info Card -->
                <div class="exam-review__student-card d-flex justify-content-between align-items-center mb-3" id="studentInfoCard">
                  <!-- Avatar, name, exam title, date, time taken, score circle - filled in by exam-review.js -->
                </div>

                <!-- Dynamic Question Cards List (Positioned directly below Student Card) -->
                <div id="questionsReview" class="mb-3">
                  <!-- Filled in dynamically by exam-review.js -->
                </div>

                <!-- Teacher Feedback Terminal -->
                <div id="feedbackSection" class="exam-review-question__feedback p-4 card shadow-sm mb-4">
                  <div class="exam-review-question__feedback-header mb-3">
                    <span class="exam-review-question__feedback-title fw-bold">
                      <i class="fa-solid fa-pen shadow-icon"></i> Teacher Feedback (optional)
                    </span>
                  </div>
                  <textarea id="feedbackTextarea" class="inp w-100 exam-review-question__feedback-textarea mb-3" rows="3" placeholder="Leave an optional comment for this student..."></textarea>
                  <div class="d-flex justify-content-end align-items-center gap-3">
                    <span id="feedbackSavedMsg" class="exam-review-question__feedback-saved text-success">
                      <i class="fa-solid fa-check"></i> Saved!
                    </span>
                    <button type="button" id="saveFeedbackBtn" class="exam-review-question__save-btn btn--secondary">Save Feedback</button>
                  </div>
                </div>
              </div>

              <!-- Right Column: Sticky Sidebar with Stat & Trivia Cards -->
              <div class="col-lg-3 sticky-top-sidebar">
                <div class="exam-review__stat-card mb-3" id="questionsStatCard">
                  <!-- "Questions X Total" - filled in by exam-review.js -->
                </div>

                <div class="exam-review__trivia-card">
                  <span class="exam-review__trivia-title d-block mb-1">
                    <i class="fa-solid fa-lightbulb"></i> Did you know?
                  </span>
                  <p class="exam-review__trivia-text small text-muted mb-0">
                    There are more atoms in a single glass of water than glasses of water in all the Earth's oceans!
                  </p>
                </div>
              </div>

            </div> <!-- Closes .row -->

          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- Core Initialization Script Orchestration Stack -->
  <script src="../js/db.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/pages/teacher/exam-review.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
