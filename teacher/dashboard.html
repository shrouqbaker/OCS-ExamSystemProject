<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/pages/dashboardTeacher.css">
    <title>Dashboard</title>
</head>



<body data-role="teacher" data-page="dashboard">
    <!-- Shared Sidebar -->
    <div class="dashboard-layout">

        <!-- Sidebar -->
        <aside id="sidebar" class="app-sidebar offcanvas-lg offcanvas-start" tabindex="-1">
        </aside>

        <main class="dashboard-main">

            <!-- Topbar -->
            <div id="topbar"></div>
            <div class="dashboard-content">

                <!-- Welcome -->
                <section class="teacher-hero">

                    <h1 class="hero-title">
                        👋 Welcome back,
                        <span id="teacherName">Teacher</span>!
                    </h1>

                    <p class="hero-subtitle">
                        Help your students discover science in a fun way.
                    </p>

                </section>

                <!-- Stats -->
                <section class="teacher-stats">

                    <div class="stat-card stat-card--green ">

                        <small>Total Students</small>

                        <h2 id="totalStudents" class="white">
                            0
                        </h2>


                    </div>

                    <div class="stat-card stat-card--purple">

                        <small>Active Exams</small>

                        <h2 id="activeExams" class="white">
                            0
                        </h2>

                    </div>

                    <div class="stat-card">

                        <small>Average Grade</small>

                        <h2 id="averageGrade">
                            0%
                        </h2>


                    </div>

                    <div class="stat-card">

                        <small>Highest Score</small>

                        <h2 id="highestScore">
                            0%
                        </h2>



                    </div>

                </section>

                <!-- Quick Actions -->
                <section class="actions-card">

                    <h2>
                        Teacher Quick Actions
                    </h2>

                    <div class="actions-grid">

                        <button class="action action--green">

                            <i class="bi bi-person-plus-fill"></i>

                            <h4>Add Student</h4>

                        </button>

                        <button class="action action--purple">

                            <i class="bi bi-ui-checks-grid"></i>

                            <h4>Create Exam</h4>

                        </button>

                        <button class="action">

                            <i class="bi bi-eye-fill"></i>

                            <h4>View Progress</h4>

                        </button>

                    </div>

                </section>

                <!-- Recent Students -->
                <div class="section-header">

                    <h2>Recent Students</h2>

                    <a href="students.html">View All</a>

                </div>

                <section class="dashboard-section">


                    <div class="table-responsive">

                        <table class="table dashboard-table align-middle">

                            <thead>

                                <tr>

                                    <th>Student Name</th>
                                    <th>Gender</th>
                                    <th>National ID</th>
                                    <th>Username</th>

                                </tr>

                            </thead>

                            <tbody id="recentStudents"></tbody>

                        </table>

                    </div>

                </section>

                <div class="row g-4">

                    <!-- Recent Results -->
                    <div class="col-lg-6">
                        <div class="section-header">

                            <h2>Recent Results</h2>

                        </div>

                        <section class="dashboard-section">



                            <div id="recentResults"></div>

                        </section>

                    </div>

                    <!-- Upcoming Exams -->
                    <div class="col-lg-6">
                        <div class="section-header">

                            <h2>Upcoming Exams</h2>


                        </div>
                        <section class="dashboard-section">



                            <div id="upcomingExams"></div>

                        </section>

                    </div>

                </div>

            </div>


        </main>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/pages/teacher/dashboardTeacher.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>



</html>
